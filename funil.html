  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green:     #1a5c38;
    --green-mid: #2d7a50;
    --green-bg:  #eaf2ed;
    --text:      #0f1c14;
    --text-2:    #4a6358;
    --text-3:    #9eabbe;
    --border:    #e4e9ec;
    --bg:        #f0f3f5;
    --card:      #ffffff;
  }

  body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: var(--card); border-bottom: 1px solid var(--border);
    padding: 0 32px; height: 56px; display: flex; align-items: center; gap: 16px;
  }
  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .logo:hover .logo-back { opacity: 1; transform: translateX(0); }
  .logo-back { font-size: 0.75rem; color: var(--green); opacity: 0; transform: translateX(4px); transition: opacity 0.2s, transform 0.2s; font-weight: 600; }
  .logo-mark { width: 30px; height: 30px; background: var(--green); border-radius: 7px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 0.85rem; letter-spacing: -0.5px; flex-shrink: 0; transition: background 0.2s; }
  .logo:hover .logo-mark { background: var(--green-mid); }
  .logo-name { font-size: 0.875rem; font-weight: 600; color: var(--text); }
  .header-title { font-size: 0.8rem; color: var(--text-3); font-weight: 500; margin-left: 4px; }

  main { padding: 32px; max-width: 1200px; margin: 0 auto; }

  /* Page header + week navigation */
  .page-header { margin-bottom: 28px; }
  .week-nav-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .week-btn {
    width: 32px; height: 32px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--card); cursor: pointer; color: var(--text-2); font-size: 0.95rem;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    transition: all 0.15s;
  }
  .week-btn:hover:not(:disabled) { border-color: var(--green); color: var(--green); background: var(--green-bg); }
  .week-btn:disabled { opacity: 0.3; cursor: default; }
  .share-btn {
    margin-left: auto; height: 32px; padding: 0 12px;
    border: 1px solid var(--green); border-radius: 8px;
    background: var(--green-bg); color: var(--green);
    font-size: 0.72rem; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; gap: 4px;
    transition: all 0.15s;
  }
  .share-btn:hover { background: var(--green); color: white; }
  .page-header h1 { font-size: 1.4rem; font-weight: 800; color: var(--text); letter-spacing: -0.3px; margin-bottom: 4px; }
  .page-header p  { font-size: 0.85rem; color: var(--text-2); }

  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 0.6rem; font-weight: 800; letter-spacing: 0.9px; text-transform: uppercase;
    padding: 3px 8px; border-radius: 20px; background: var(--green-bg); color: var(--green);
  }
  .badge .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
  .badge-empty { background: var(--bg); color: var(--text-3); }

  /* Totals */
  .totals-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
  .total-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; display: flex; align-items: center; gap: 12px; }
  .total-icon { width: 38px; height: 38px; background: var(--green-bg); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
  .total-label { font-size: 0.7rem; color: var(--text-2); font-weight: 500; margin-bottom: 2px; }
  .total-value { font-size: 1.25rem; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }

  /* Vaga groups */
  .grupo { margin-bottom: 28px; }
  .grupo-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 12px; padding: 0 4px; }
  .grupo-titulo { font-size: 0.72rem; font-weight: 800; letter-spacing: 1.4px; text-transform: uppercase; color: var(--text-2); }
  .grupo-count { font-size: 0.7rem; font-weight: 600; color: var(--text-3); }

  /* Vaga cards */
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .vaga-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; transition: opacity 0.2s; }
  .vaga-card.completed { opacity: 0.55; }
  .vaga-card.completed:hover { opacity: 0.85; }
  .vaga-header { padding: 16px 18px 12px; border-bottom: 1px solid var(--border); }
  .vaga-header-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .vaga-title { font-size: 0.95rem; font-weight: 700; color: var(--text); letter-spacing: -0.2px; margin-top: 6px; line-height: 1.25; min-height: 2.4em; }
  .btn-concluir {
    border: 1px solid var(--border); border-radius: 6px; background: var(--card);
    cursor: pointer; padding: 4px 8px; font-size: 0.6rem; font-weight: 800;
    letter-spacing: 0.4px; color: var(--text-2); text-transform: uppercase;
    transition: all 0.15s; flex-shrink: 0;
  }
  .btn-concluir:hover { background: var(--green-bg); color: var(--green); border-color: var(--green); }
  .vaga-card.completed .btn-concluir { background: var(--green); color: white; border-color: var(--green); }
  .vaga-card.completed .btn-concluir:hover { background: var(--green-mid); }
  .etapas { padding: 14px 0 4px; }
  .etapa { padding: 12px 20px 14px; border-bottom: 1px solid var(--border); }
  .etapa:last-child { border-bottom: none; }
  .etapa-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .etapa-label-wrap { display: flex; align-items: center; gap: 8px; }
  .etapa-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-hr   { background: #6b7fa3; }
  .dot-role { background: #2d7a50; }
  .dot-cult { background: var(--green); }
  .etapa-nome { font-size: 0.8rem; font-weight: 700; color: var(--text); }
  .etapa-desc { font-size: 0.68rem; color: var(--text-3); font-weight: 400; margin-top: 1px; }
  .etapa-count { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; }
  .count-hr   { color: #6b7fa3; }
  .count-role { color: #2d7a50; }
  .count-cult { color: var(--green); }
  .count-zero { color: var(--text-3); font-size: 1rem; }
  .etapa-bar-wrap { height: 3px; background: var(--border); border-radius: 4px; margin-bottom: 10px; overflow: hidden; }
  .etapa-bar { height: 100%; border-radius: 4px; }
  .bar-hr   { background: #b0bfde; }
  .bar-role { background: #4aab78; }
  .bar-cult { background: var(--green); }

  /* Candidate list */
  .candidatos { list-style: none; display: flex; flex-direction: column; gap: 4px; }
  .candidatos li {
    font-size: 0.7rem; color: var(--text-2); font-weight: 500;
    padding: 4px 8px; border-radius: 6px; background: var(--bg);
    display: flex; align-items: center; gap: 6px;
    transition: background 0.15s, opacity 0.15s;
    cursor: grab;
  }
  .candidatos li:active { cursor: grabbing; }
  .candidatos li.dragging { opacity: 0.4; }
  .etapa.drag-over { background: var(--green-bg); outline: 2px dashed var(--green); outline-offset: -4px; border-radius: 6px; }
  .etapa.drag-over .vazia { color: var(--green); font-weight: 600; }
  .candidatos li::before { content: ''; width: 4px; height: 4px; border-radius: 50%; background: var(--text-3); flex-shrink: 0; transition: background 0.15s; }
  .cand-nome { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cand-right { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
  .dia { font-size: 0.6rem; color: var(--text-3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .cand-actions { display: flex; gap: 3px; }
  .btn-approve, .btn-reject, .btn-reschedule, .btn-decline {
    width: 18px; height: 18px; border: none; border-radius: 4px;
    cursor: pointer; padding: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .btn-approve { background: #d4edda; color: #2e7d32; }
  .btn-reject  { background: #f8d7da; color: #c62828; }
  .btn-approve:hover { background: #b8dfc4; transform: scale(1.1); }
  .btn-reject:hover  { background: #f4bec3; transform: scale(1.1); }
  .btn-approve.active    { background: #28a745; color: white; }
  .btn-reject.active     { background: #dc3545; color: white; }
  .btn-reschedule        { background: #dbeafe; color: #1e40af; }
  .btn-reschedule:hover  { background: #bfdbfe; transform: scale(1.1); }
  .btn-reschedule.active { background: #2563eb; color: white; }
  .btn-decline           { background: #fff3cd; color: #92400e; }
  .btn-decline:hover     { background: #ffe69c; transform: scale(1.1); }
  .btn-decline.active    { background: #f59e0b; color: white; }

  /* Approved / rejected / rescheduled / declined row state */
  .candidatos li.aprovado    { background: #d4edda; }
  .candidatos li.reprovado   { background: #fdecea; }
  .candidatos li.reagendado  { background: #dbeafe; }
  .candidatos li.declinou    { background: #fff3cd; }
  .candidatos li.aprovado::before   { background: #28a745; }
  .candidatos li.reprovado::before  { background: #dc3545; }
  .candidatos li.reagendado::before { background: #2563eb; }
  .candidatos li.declinou::before   { background: #f59e0b; }

  .vazia { font-size: 0.72rem; color: var(--text-3); font-style: italic; padding: 4px 0; }

  /* Approval / rejection stats strip */
  .etapa-stats { display: flex; gap: 5px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); flex-wrap: wrap; }
  .stat-pill { flex: 1 1 0; min-width: 0; display: flex; align-items: center; gap: 4px; padding: 5px 7px; border-radius: 7px; }
  .stat-pill.aprov  { background: #eaf7ee; }
  .stat-pill.reprov { background: #fdecea; }
  .stat-pill.reag   { background: #dbeafe; }
  .stat-pill.decl   { background: #fff3cd; }
  .stat-pill .stat-icon { font-size: 0.7rem; font-weight: 900; }
  .stat-pill.aprov  .stat-icon { color: #1b6b2e; }
  .stat-pill.reprov .stat-icon { color: #c62828; }
  .stat-pill.reag   .stat-icon { color: #1e40af; }
  .stat-pill.decl   .stat-icon { color: #92400e; }
  .stat-pill .stat-n { font-size: 0.82rem; font-weight: 800; letter-spacing: -0.3px; }
  .stat-pill.aprov  .stat-n { color: #1b6b2e; }
  .stat-pill.reprov .stat-n { color: #c62828; }
  .stat-pill.reag   .stat-n { color: #1e40af; }
  .stat-pill.decl   .stat-n { color: #92400e; }
  .stat-pill .stat-lbl { font-size: 0.58rem; font-weight: 500; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .stat-pill .stat-pct { font-size: 0.62rem; font-weight: 700; margin-left: auto; }
  .stat-pill.aprov  .stat-pct { color: #2e7d32; }
  .stat-pill.reprov .stat-pct { color: #b71c1c; }
  .stat-pill.reag   .stat-pct { color: #2563eb; }
  .stat-pill.decl   .stat-pct { color: #b45309; }

  @media (max-width: 900px) {
    .grid { grid-template-columns: 1fr; }
    .totals-row { grid-template-columns: repeat(2, 1fr); }
    main { padding: 20px 16px; }
  }
</style>

// ── WEEK GENERATION ──
function generateWeeks(from, count) {
  const weeks = [];
  const d = new Date(from + 'T12:00:00');
  for (let i = 0; i < count; i++) {
    weeks.push(d.toISOString().slice(0, 10));
    d.setDate(d.getDate() + 7);
  }
  return weeks;
}

function weekLabel(mondayStr) {
  if (AGENDA.weeks[mondayStr]) return AGENDA.weeks[mondayStr].weekLabel;
  const mon = new Date(mondayStr + 'T12:00:00');
  const fri = new Date(mon); fri.setDate(mon.getDate() + 4);
  const d1 = mon.getDate(), m1 = mon.getMonth();
  const d2 = fri.getDate(), m2 = fri.getMonth(), y = fri.getFullYear();
  return m1 === m2
    ? `${d1} a ${d2} de ${MONTH_NAMES[m1]} de ${y}`
    : `${d1} de ${MONTH_NAMES[m1]} a ${d2} de ${MONTH_NAMES[m2]} de ${y}`;
}

const ALL_WEEKS = generateWeeks('2026-05-04', 28);

  : 1;

// ── SHARED STATE (Firebase Realtime DB if FIREBASE_DB_URL set; otherwise localStorage) ──
// Set FIREBASE_DB_URL to your Firebase project's Realtime Database URL to enable shared state.
// Setup: console.firebase.google.com → criar projeto → Realtime Database → Iniciar no modo de teste →
//        copiar a URL (algo como https://NOME-default-rtdb.firebaseio.com).
const FIREBASE_DB_URL = '';

const _hasFirebase = () => /^https:\/\/[^\s]+/.test(FIREBASE_DB_URL);
let _state = { status: {}, moves: {}, completed: {} };
const SYNC_INTERVAL_MS = 3000;

function _loadLocalToState() {
  _state = { status: {}, moves: {}, completed: {} };
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i); if (!k) continue;
    if      (k.startsWith('allu_completed|')) _state.completed[k.slice(15)] = localStorage.getItem(k);
    else if (k.startsWith('allu_move|'))      _state.moves[k.slice(10)]     = localStorage.getItem(k);
    else if (k.startsWith('allu|'))           _state.status[k.slice(5)]     = localStorage.getItem(k);
  }
}

async function _loadFirebaseToState() {
  try {
    const res = await fetch(`${FIREBASE_DB_URL}/state.json`, { cache: 'no-store' });
    const data = await res.json();
    _state = {
      status:    (data && data.status)    || {},
      moves:     (data && data.moves)     || {},
      completed: (data && data.completed) || {}
    };
  } catch (e) { console.error('Firebase load failed:', e); }
}

async function _migrateLocalToFirebaseIfEmpty() {
  if (!_hasFirebase()) return;
  const remoteEmpty = Object.keys(_state.status).length === 0
                   && Object.keys(_state.moves).length === 0
                   && Object.keys(_state.completed || {}).length === 0;
  if (!remoteEmpty) return;
  const local = { status: {}, moves: {}, completed: {} };
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i); if (!k) continue;
    if      (k.startsWith('allu_completed|')) local.completed[k.slice(15)] = localStorage.getItem(k);
    else if (k.startsWith('allu_move|'))      local.moves[k.slice(10)]     = localStorage.getItem(k);
    else if (k.startsWith('allu|'))           local.status[k.slice(5)]     = localStorage.getItem(k);
  }
  const localEmpty = Object.keys(local.status).length === 0
                  && Object.keys(local.moves).length === 0
                  && Object.keys(local.completed).length === 0;
  if (localEmpty) return;
  try {
    await fetch(`${FIREBASE_DB_URL}/state.json`, { method: 'PUT', body: JSON.stringify(local) });
    _state = local;
  } catch (e) { console.error('Firebase migration failed:', e); }
}

async function _pollFirebase() {
  if (!_hasFirebase() || document.hidden) return;
  try {
    const res = await fetch(`${FIREBASE_DB_URL}/state.json`, { cache: 'no-store' });
    const data = await res.json();
    const newState = {
      status:    (data && data.status)    || {},
      moves:     (data && data.moves)     || {},
      completed: (data && data.completed) || {}
    };
    if (JSON.stringify(newState) !== JSON.stringify(_state)) { _state = newState; render(); }
  } catch (e) { console.error('Firebase poll failed:', e); }
}

async function _writeFirebase(section, key, value) {
  if (!_hasFirebase()) return;
  const url = `${FIREBASE_DB_URL}/state/${section}/${encodeURIComponent(key)}.json`;
  try {
    if (value === null || value === undefined) await fetch(url, { method: 'DELETE' });
    else await fetch(url, { method: 'PUT', body: JSON.stringify(value) });
  } catch (e) { console.error('Firebase write failed:', e); }
}

// ── APPROVAL STATUS (keyed by ORIGIN; status follows a moved candidate) ──
function getStatus(weekKey, vaga, stage, nome) {
  return _state.status[`${weekKey}|${vaga}|${stage}|${nome}`] || '';
}
function setStatus(weekKey, vaga, stage, nome, val) {
  const k = `${weekKey}|${vaga}|${stage}|${nome}`;
  if (val == null || val === '') {
    delete _state.status[k];
    if (_hasFirebase()) _writeFirebase('status', k, null);
    else { localStorage.removeItem(`allu|${k}`); _updateURL(); }
  } else {
    _state.status[k] = val;
    if (_hasFirebase()) _writeFirebase('status', k, val);
    else { localStorage.setItem(`allu|${k}`, val); _updateURL(); }
  }
}

// ── MOVE OVERRIDES (drag-and-drop persistence) ──
function getMove(weekKey, origVaga, origStage, nome) {
  const v = _state.moves[`${weekKey}|${origVaga}|${origStage}|${nome}`];
  if (!v) return null;
  const [vaga, stage, dia] = v.split('|');
  return { vaga, stage, dia };
}
function setMove(weekKey, origVaga, origStage, nome, destVaga, destStage, dia) {
  const k = `${weekKey}|${origVaga}|${origStage}|${nome}`;
  const v = `${destVaga}|${destStage}|${dia}`;
  _state.moves[k] = v;
  if (_hasFirebase()) _writeFirebase('moves', k, v);
  else { localStorage.setItem(`allu_move|${k}`, v); _updateURL(); }
}
function clearMove(weekKey, origVaga, origStage, nome) {
  const k = `${weekKey}|${origVaga}|${origStage}|${nome}`;
  delete _state.moves[k];
  if (_hasFirebase()) _writeFirebase('moves', k, null);
  else { localStorage.removeItem(`allu_move|${k}`); _updateURL(); }
}

// ── COMPLETED VAGAS (per week — moves the vaga to the end of its group) ──
function isCompleted(weekKey, vaga) {
  return !!_state.completed[`${weekKey}|${vaga}`];
}
function setCompleted(weekKey, vaga, val) {
  const k = `${weekKey}|${vaga}`;
  if (val) {
    _state.completed[k] = '1';
    if (_hasFirebase()) _writeFirebase('completed', k, '1');
    else { localStorage.setItem(`allu_completed|${k}`, '1'); _updateURL(); }
  } else {
    delete _state.completed[k];
    if (_hasFirebase()) _writeFirebase('completed', k, null);
    else { localStorage.removeItem(`allu_completed|${k}`); _updateURL(); }
  }
}
window._toggleCompleted = function(weekKey, vaga) {
  setCompleted(weekKey, vaga, !isCompleted(weekKey, vaga));
  render();
};

// ── URL-EMBEDDED STATE SHARING (fallback when no Firebase configured) ──
function _encodeStateB64(s) {
  return btoa(unescape(encodeURIComponent(JSON.stringify(s))))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}
function _decodeStateB64(b64) {
  try {
    const s = b64.replace(/-/g, '+').replace(/_/g, '/');
    return JSON.parse(decodeURIComponent(escape(atob(s))));
  } catch (e) { return null; }
}
function _updateURL() {
  if (_hasFirebase()) return;
  const empty = Object.keys(_state.status).length === 0 && Object.keys(_state.moves).length === 0;
  const url = new URL(window.location.href);
  if (empty) url.searchParams.delete('s');
  else url.searchParams.set('s', _encodeStateB64(_state));
  history.replaceState(null, '', url.toString());
}
function _loadFromURL() {
  const param = new URL(window.location.href).searchParams.get('s');
  if (!param) return false;
  const incoming = _decodeStateB64(param);
  if (!incoming) return false;
  // URL state wins on conflicts (you're viewing a shared state)
  _state = {
    status: { ..._state.status, ...(incoming.status || {}) },
    moves:  { ..._state.moves,  ...(incoming.moves  || {}) }
  };
  // Persist into localStorage so reload/new sessions retain it
  for (const [k, v] of Object.entries(_state.status)) localStorage.setItem(`allu|${k}`, v);
  for (const [k, v] of Object.entries(_state.moves))  localStorage.setItem(`allu_move|${k}`, v);
  return true;
}
window._copyShareLink = async function() {
  const btn = document.getElementById('copy-link-btn');
  const orig = btn ? btn.innerHTML : '';
  try {
    await navigator.clipboard.writeText(window.location.href);
    if (btn) { btn.innerHTML = '✓ Copiado!'; setTimeout(() => btn.innerHTML = orig, 1500); }
  } catch {
    if (btn) { btn.innerHTML = 'Copia da URL ↑'; setTimeout(() => btn.innerHTML = orig, 2500); }
  }
};

// Apply moves to baseVagas → each entry annotated with origVaga/origStage (used for status + drag identity)
function effectiveVagas(weekKey, baseVagas) {
  const allStages = ['hrInterview', 'roleplay', 'cultura'];
  const eff = {};
  for (const v of Object.keys(baseVagas)) eff[v] = { hrInterview: [], roleplay: [], cultura: [] };
  for (const [vaga, stages] of Object.entries(baseVagas)) {
    for (const stage of allStages) {
      for (const cd of (stages[stage] || [])) {
        const move = getMove(weekKey, vaga, stage, cd.nome);
        const target = move && eff[move.vaga] ? { vaga: move.vaga, stage: move.stage, dia: move.dia } : { vaga, stage, dia: cd.dia };
        eff[target.vaga][target.stage].push({ nome: cd.nome, dia: target.dia, origVaga: vaga, origStage: stage });
      }
    }
  }
  return eff;
}

// Global registry reset each render — avoids string-escaping issues in onclick
let _reg = [];
window._toggle = function(idx, val) {
  const {weekKey, vaga, stage, nome} = _reg[idx];
  const cur = getStatus(weekKey, vaga, stage, nome);
  setStatus(weekKey, vaga, stage, nome, cur === val ? null : val);
  render();
};

// Drag-and-drop: persist moves in localStorage, status follows candidate via origVaga/origStage.
// Buttons are protected from triggering drag (preventDefault in dragstart if target is inside .cand-actions).
function _onDragStart(e) {
  const li = e.target.closest('li[data-orig-vaga]');
  if (!li) return;
  if (e.target.closest('.cand-actions')) { e.preventDefault(); return; }
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('application/json', JSON.stringify({
    weekKey:    li.dataset.week,
    origVaga:   li.dataset.origVaga,
    origStage:  li.dataset.origStage,
    nome:       li.dataset.nome,
    dia:        li.dataset.dia
  }));
  li.classList.add('dragging');
}
function _onDragEnd(e) {
  const li = e.target.closest('li[data-orig-vaga]');
  if (li) li.classList.remove('dragging');
  document.querySelectorAll('.etapa.drag-over').forEach(el => el.classList.remove('drag-over'));
}
function _onDragOver(e) {
  const etapa = e.target.closest('.etapa[data-vaga]');
  if (!etapa) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  etapa.classList.add('drag-over');
}
function _onDragLeave(e) {
  const etapa = e.target.closest('.etapa[data-vaga]');
  if (!etapa) return;
  // Only remove if we actually left the etapa (not just moved between its children)
  if (!etapa.contains(e.relatedTarget)) etapa.classList.remove('drag-over');
}
function _onDrop(e) {
  const etapa = e.target.closest('.etapa[data-vaga]');
  if (!etapa) return;
  e.preventDefault();
  etapa.classList.remove('drag-over');
  let payload;
  try { payload = JSON.parse(e.dataTransfer.getData('application/json')); } catch { return; }
  if (!payload || !payload.nome) return;
  const destVaga  = etapa.dataset.vaga;
  const destStage = etapa.dataset.stage;
  // Drop back at origin → clear the move (revert)
  if (destVaga === payload.origVaga && destStage === payload.origStage) {
    clearMove(payload.weekKey, payload.origVaga, payload.origStage, payload.nome);
  } else {
    setMove(payload.weekKey, payload.origVaga, payload.origStage, payload.nome, destVaga, destStage, payload.dia);
  }
  render();
}
document.addEventListener('dragstart', _onDragStart);
document.addEventListener('dragend',   _onDragEnd);
document.addEventListener('dragover',  _onDragOver);
document.addEventListener('dragleave', _onDragLeave);
document.addEventListener('drop',      _onDrop);

// ── RENDERING ──
function pct(n, max) { return max === 0 ? 0 : Math.round(n / max * 100); }

function renderCandidate(cd, weekKey, vaga, stage) {
  // cd carries origVaga/origStage (set by effectiveVagas); fall back to current location for safety
  const origVaga  = cd.origVaga  || vaga;
  const origStage = cd.origStage || stage;
  const status = getStatus(weekKey, origVaga, origStage, cd.nome);
  const idx = _reg.length;
  _reg.push({ weekKey, vaga: origVaga, stage: origStage, nome: cd.nome });
  const esc = s => String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  return `<li class="${status}" draggable="true" data-week="${esc(weekKey)}" data-orig-vaga="${esc(origVaga)}" data-orig-stage="${esc(origStage)}" data-nome="${esc(cd.nome)}" data-dia="${esc(cd.dia)}">
    <span class="cand-nome">${cd.nome}</span>
    <div class="cand-right">
      <span class="dia">${cd.dia}</span>
      <div class="cand-actions">
        <button class="btn-approve${status === 'aprovado' ? ' active' : ''}" onclick="_toggle(${idx},'aprovado')" title="Aprovado"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></button>
        <button class="btn-reject${status === 'reprovado' ? ' active' : ''}" onclick="_toggle(${idx},'reprovado')" title="Reprovado"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        <button class="btn-reschedule${status === 'reagendado' ? ' active' : ''}" onclick="_toggle(${idx},'reagendado')" title="Reagendar"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M21 13a9 9 0 1 1-3-7.7L21 8"/></svg></button>
        <button class="btn-decline${status === 'declinou' ? ' active' : ''}" onclick="_toggle(${idx},'declinou')" title="Declinou"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.9" y1="4.9" x2="19.1" y2="19.1"/></svg></button>
      </div>
    </div>
  </li>`;
}

function renderEtapa(stage, candidates, barWidth, weekKey, vaga) {
  const c = STAGE_COLORS[stage], l = STAGE_LABELS[stage], n = candidates.length;
  const statOf = cd => getStatus(weekKey, cd.origVaga || vaga, cd.origStage || stage, cd.nome);
  const nAprov  = candidates.filter(cd => statOf(cd) === 'aprovado').length;
  const nReprov = candidates.filter(cd => statOf(cd) === 'reprovado').length;
  const nReag   = candidates.filter(cd => statOf(cd) === 'reagendado').length;
  const nDecl   = candidates.filter(cd => statOf(cd) === 'declinou').length;
  const pctAprov  = n > 0 ? Math.round(nAprov  / n * 100) : 0;
  const pctReprov = n > 0 ? Math.round(nReprov / n * 100) : 0;
  const pctReag   = n > 0 ? Math.round(nReag   / n * 100) : 0;
  const pctDecl   = n > 0 ? Math.round(nDecl   / n * 100) : 0;
  const esc = s => String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;');
  return `<div class="etapa" data-week="${esc(weekKey)}" data-vaga="${esc(vaga)}" data-stage="${esc(stage)}">
    <div class="etapa-top">
      <div class="etapa-label-wrap">
        <div class="etapa-dot ${c.dot}"></div>
        <div>
          <div class="etapa-nome">${l.nome}</div>
          <div class="etapa-desc">${l.desc}</div>
        </div>
      </div>
      ${n > 0 ? `<div class="etapa-count ${c.count}">${n}</div>` : `<div class="etapa-count count-zero">—</div>`}
    </div>
    <div class="etapa-bar-wrap"><div class="etapa-bar ${c.bar}" style="width:${barWidth}%"></div></div>
    ${n > 0
      ? `<ul class="candidatos">${candidates.map(cd => renderCandidate(cd, weekKey, vaga, stage)).join('')}</ul>
         <div class="etapa-stats">
           <div class="stat-pill aprov"><span class="stat-icon">✓</span><span class="stat-n">${nAprov}</span><span class="stat-lbl">aprov.</span><span class="stat-pct">${pctAprov}%</span></div>
           <div class="stat-pill reprov"><span class="stat-icon">✗</span><span class="stat-n">${nReprov}</span><span class="stat-lbl">reprov.</span><span class="stat-pct">${pctReprov}%</span></div>
           <div class="stat-pill reag"><span class="stat-icon">↻</span><span class="stat-n">${nReag}</span><span class="stat-lbl">reag.</span><span class="stat-pct">${pctReag}%</span></div>
           <div class="stat-pill decl"><span class="stat-icon">⊘</span><span class="stat-n">${nDecl}</span><span class="stat-lbl">decl.</span><span class="stat-pct">${pctDecl}%</span></div>
         </div>`
      : `<p class="vazia">Nenhuma entrevista agendada</p>`}
  </div>`;
}

function renderVaga(nome, data, maxes, weekKey) {
  const meta = VAGAS_META[nome] || {};
  const cad = meta.cadeiras;
  const badgeContent = cad
    ? `${cad} ${cad === 1 ? 'vaga aberta' : 'vagas abertas'}`
    : 'sem meta definida';
  const badgeClass = cad ? 'badge' : 'badge badge-empty';
  const done = isCompleted(weekKey, nome);
  const escAttr = s => String(s).replace(/'/g, "\\'");
  return `<div class="vaga-card${done ? ' completed' : ''}">
    <div class="vaga-header">
      <div class="vaga-header-top">
        <div class="${badgeClass}"><span class="dot"></span>${badgeContent}</div>
        <button class="btn-concluir" onclick="_toggleCompleted('${escAttr(weekKey)}','${escAttr(nome)}')" title="${done ? 'Reabrir vaga (volta pra ordem original)' : 'Concluir vaga (move pro final do grupo)'}">${done ? '↩ Reabrir' : '✓ Concluir'}</button>
      </div>
      <div class="vaga-title">${nome}</div>
    </div>
    <div class="etapas">
      ${renderEtapa('hrInterview', data.hrInterview, pct(data.hrInterview.length, maxes.hr), weekKey, nome)}
      ${renderEtapa('roleplay',    data.roleplay,    pct(data.roleplay.length,    maxes.rp), weekKey, nome)}
      ${renderEtapa('cultura',     data.cultura,     pct(data.cultura.length,     maxes.cu), weekKey, nome)}
    </div>
  </div>`;
}

const VAGAS_META = {
  "SDR":                  { cadeiras: 15 },
  "Closer":               { cadeiras: 9  },
  "Farmer":               { cadeiras: 5  },
  "Supervisão de Closer": { cadeiras: 2  },
  "Supervisão de Farmer": { cadeiras: 2  }
};

const VAGA_GROUPS = [
  { titulo: 'Vendas Operacional',     vagas: ['SDR', 'Closer', 'Farmer'] },
  { titulo: 'Lideranças',             vagas: ['Coord./Supervisão de SDR', 'Supervisão de Closer', 'Supervisão de Farmer'] },
  { titulo: 'Especialistas & Suporte', vagas: ['TA', 'Sales Enablement Sênior'] }
];

function render() {
  _reg = [];
  const weekKey = ALL_WEEKS[weekIdx];
  const weekData = AGENDA.weeks[weekKey];
  const EMPTY = { hrInterview: [], roleplay: [], cultura: [] };
  const FALLBACK = Object.fromEntries(VAGA_GROUPS.flatMap(g => g.vagas).map(v => [v, { hrInterview: [], roleplay: [], cultura: [] }]));
  const baseVagas = weekData ? weekData.vagas : FALLBACK;
  // Apply drag-and-drop overrides from localStorage
  const vagas = effectiveVagas(weekKey, baseVagas);
  const names = VAGA_GROUPS.flatMap(g => g.vagas).filter(v => vagas[v]);

  const get = v => vagas[v] || EMPTY;
  const maxes = {
    hr: Math.max(1, ...names.map(v => get(v).hrInterview.length)),
    rp: Math.max(1, ...names.map(v => get(v).roleplay.length)),
    cu: Math.max(1, ...names.map(v => get(v).cultura.length))
  };
  const totHR = names.reduce((s, v) => s + get(v).hrInterview.length, 0);
  const totRP = names.reduce((s, v) => s + get(v).roleplay.length, 0);
  const totCU = names.reduce((s, v) => s + get(v).cultura.length, 0);
  const total = totHR + totRP + totCU;

  const label = weekLabel(weekKey);
  const isPrev = weekIdx > 0;
  const isNext = weekIdx < ALL_WEEKS.length - 1;

  const renderGrupo = grupo => {
    let vagasGrupo = grupo.vagas.filter(v => vagas[v]);
    if (!vagasGrupo.length) return '';
    // Concluidas vao pro final, mantendo a ordem relativa entre si
    vagasGrupo = vagasGrupo
      .map((v, i) => ({ v, i, done: isCompleted(weekKey, v) }))
      .sort((a, b) => (a.done - b.done) || (a.i - b.i))
      .map(x => x.v);
    const totG = vagasGrupo.reduce((s, v) => s + get(v).hrInterview.length + get(v).roleplay.length + get(v).cultura.length, 0);
    return `
      <div class="grupo">
        <div class="grupo-header">
          <h2 class="grupo-titulo">${grupo.titulo}</h2>
          <span class="grupo-count">${totG} ${totG === 1 ? 'entrevista' : 'entrevistas'}</span>
        </div>
        <div class="grid">
          ${vagasGrupo.map(v => renderVaga(v, get(v), maxes, weekKey)).join('')}
        </div>
      </div>`;
  };

  document.getElementById('app').innerHTML = `
    <div class="page-header">
      <div class="week-nav-row">
        <button class="week-btn" onclick="prevWeek()" ${isPrev ? '' : 'disabled'} title="Semana anterior">&#8592;</button>
        <div class="badge"><span class="dot"></span>${label}</div>
        <button class="week-btn" onclick="nextWeek()" ${isNext ? '' : 'disabled'} title="Próxima semana">&#8594;</button>
        <button id="copy-link-btn" class="share-btn" onclick="_copyShareLink()" title="Copia o link com suas marcações para compartilhar">🔗 Copiar link compartilhável</button>
      </div>
      <h1>Entrevistas da Semana</h1>
      <p>HR Interview, Roleplay e Cultura — agrupado por Operação e Liderança</p>
    </div>

    <div class="totals-row">
      <div class="total-card"><div class="total-icon">🗓️</div><div><div class="total-label">Total de entrevistas</div><div class="total-value">${total}</div></div></div>
      <div class="total-card"><div class="total-icon">🎙️</div><div><div class="total-label">HR Interview</div><div class="total-value">${totHR}</div></div></div>
      <div class="total-card"><div class="total-icon">🎭</div><div><div class="total-label">Roleplay</div><div class="total-value">${totRP}</div></div></div>
      <div class="total-card"><div class="total-icon">🤝</div><div><div class="total-label">Cultura</div><div class="total-value">${totCU}</div></div></div>
    </div>

    ${VAGA_GROUPS.map(renderGrupo).join('')}`;
}

function prevWeek() { if (weekIdx > 0) { weekIdx--; render(); } }
function nextWeek() { if (weekIdx < ALL_WEEKS.length - 1) { weekIdx++; render(); } }

async function _init() {
  if (_hasFirebase()) {
    await _loadFirebaseToState();
    await _migrateLocalToFirebaseIfEmpty();
    setInterval(_pollFirebase, SYNC_INTERVAL_MS);
    document.addEventListener('visibilitychange', () => { if (!document.hidden) _pollFirebase(); });
  } else {
    _loadLocalToState();
    if (_loadFromURL()) _updateURL();
  }
  render();
}
_init();
</script>

</body>
